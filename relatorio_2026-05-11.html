        let filterState = { priority: 'todos', group: '', mods: [], search: '' };

        function setPriority(p) { filterState.priority = p; updateUI(); filter(); }

        function toggleMod(m) {
            const idx = filterState.mods.indexOf(m);
            if(idx > -1) filterState.mods.splice(idx, 1);
            else filterState.mods.push(m);
            document.getElementById(`mod-${m}`).classList.toggle('active');
            filter();
        }

        function updateUI() {
            document.querySelectorAll('.counter').forEach(c => c.classList.remove('active'));
            document.getElementById(`btn-${filterState.priority}`).classList.add('active');
        }

        function filter() {
            filterState.group  = document.getElementById('groupSelect').value;
            filterState.search = document.getElementById('search').value.toLowerCase();

            const baseFiltered = athletes.filter(a => {
                if(filterState.group && a.group !== filterState.group) return false;
                if(filterState.search && !a.name.toLowerCase().includes(filterState.search)) return false;
                if(filterState.mods.length > 0) return filterState.mods.some(m => a[m] > 0);
                return true;
            });

            const counts = {
                todos  : baseFiltered.length,
                urgente: baseFiltered.filter(a => a.priority === 'urgente').length,
                atencao: baseFiltered.filter(a => a.priority === 'atencao').length,
                regular: baseFiltered.filter(a => a.priority === 'regular').length
            };
            document.getElementById('val-todos').innerText   = counts.todos;
            document.getElementById('val-urgente').innerText = counts.urgente;
            document.getElementById('val-atencao').innerText = counts.atencao;
            document.getElementById('val-regular').innerText = counts.regular;

            const finalDisplay = baseFiltered.filter(a =>
                filterState.priority === 'todos' || a.priority === filterState.priority
            );
            render(finalDisplay);
        }

        function render(list) {
            const grid = document.getElementById('athlete-grid');
            if(list.length === 0) {
                grid.innerHTML = '<div class="empty">Nenhum atleta encontrado.</div>';
                return;
            }
            grid.innerHTML = list.map(a => `
                <div class="athlete-card card-${a.priority}">
                    <div class="a-info">
                        <div class="a-name">${a.name}</div>
                        <div class="a-group">${a.group}</div>
                    </div>
                    <div class="a-stats">
                        <div class="stat"><span>🏃</span>${a.run}</div>
                        <div class="stat"><span>🚴</span>${a.bike}</div>
                        <div class="stat"><span>🏊</span>${a.swim}</div>
                        <div class="stat"><span>💪</span>${a.strength}</div>
                    </div>
                    <div class="a-reason">${a.reason || ''}</div>
                    <div class="card-footer">
                        <span class="tag tag-${a.priority}">${a.priority}</span>
                        <span class="a-last">${a.last || ''}</span>
                    </div>
                </div>
            `).join('');
        }

        filter();
    </script>
